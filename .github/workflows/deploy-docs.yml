name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    # src/** is included because the docs bundle the library from ../src
    # (vite alias), so library changes change the site too
    paths:
      - "docs/**"
      - "src/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight production deploy finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      # Root install too: the docs typecheck ../src (vite alias into the
      # library sources), whose react imports resolve from the repo root
      - run: npm ci
        working-directory: .
      - run: npm ci
      # typegen + tsc + prerender (see docs/package.json)
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/client
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
